<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-7714498305797826">
  <title>全国花火大会マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7714498305797826"
     crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>🎆 全国花火大会マップ</h1>
    <div class="year-selector">
      <label for="year-select">年:</label>
      <select id="year-select"></select>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="filter-section">
        <h2>エリア</h2>
        <div id="area-filters" class="filter-buttons"></div>
      </section>

      <section class="filter-section">
        <h2>月</h2>
        <div id="month-filters" class="filter-buttons"></div>
      </section>

      <section class="filter-section" id="week-section" style="display:none">
        <h2>週</h2>
        <div id="week-filters" class="filter-buttons"></div>
      </section>

      <section class="filter-section">
        <h2>花火大会一覧</h2>
        <div id="event-list" class="event-list"></div>
      </section>

      <!-- AdSense 広告 -->
      <section class="ad-section">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7714498305797826"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </section>
    </aside>

    <main>
      <div id="map"></div>
      <div id="map-message" class="map-message" style="display:none"></div>
    </main>
  </div>

  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2026 全国花火大会マップ</p>
      <div class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="separator">|</span>
        <a href="contact.html">お問い合わせ</a>
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
